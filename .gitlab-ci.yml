# wiva-android — deploy на self-hosted runner (shell), теги android + wiva.
#
# Логика:
#   1) GitLab сам подтягивает коммит с main (fetch/checkout в CI_PROJECT_DIR).
#   2) Сборка release APK: docker build --target ci-build — Gradle только внутри образа,
#      в workspace job не создаётся app/build.
#   3) APK из образа -> ./release/ -> выравнивание владельца под пользователя job ->
#      копирование в WIVA_OTA_RELEASE_DIR (например /opt/wiva-android/release).
#
# Очистка: scripts/ci-runner-cleanup.sh. При необходимости sudo включается через
# WIVA_CI_SUDO_CLEANUP=1 и NOPASSWD в sudoers для gitlab-runner.
# DOCKER_BUILDKIT=1 не задаём: без docker-buildx сборка падала в legacy Android kiosk.
#
# Переменные:
#   WIVA_OTA_RELEASE_DIR — каталог OTA на сервере; без неё APK останется только в артефактах job.
#   WIVA_APT_HTTP_MIRROR, WIVA_GRADLE_DIST_URL, WIVA_GRADLE_CACHE_FILE, WIVA_CI_SUDO_CLEANUP
#   KEYSTORE_PATH, STORE_PASSWORD, KEY_PASSWORD, KEY_ALIAS — только если нужна своя подпись.

stages:
  - deploy

variables:
  GIT_STRATEGY: fetch
  # Дефолт GitLab: -ffdx — чистит и игнорируемые (.gradle/, .kotlin/). Если они root — fetch падает до before_script.
  GIT_CLEAN_FLAGS: "-ffd"

build_release_apk:
  stage: deploy
  tags:
    - android
    - wiva
  interruptible: true
  resource_group: wiva-android-ota
  before_script:
    - export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/snap/bin:$PATH"
    - |
      if ! command -v docker >/dev/null 2>&1; then
        echo "ERROR: docker не найден в PATH."
        exit 1
      fi
    - docker version
    - chmod +x scripts/ci-runner-cleanup.sh scripts/ci-align-release-owner.sh scripts/fetch-gradle-for-docker.sh
    - scripts/ci-runner-cleanup.sh
  script:
    - |
      if [ -n "${WIVA_APT_HTTP_MIRROR:-}" ]; then
        export APT_HTTP_MIRROR="$WIVA_APT_HTTP_MIRROR"
      fi
    - scripts/fetch-gradle-for-docker.sh
    - |
      docker build \
        --no-cache \
        -f Dockerfile.build \
        --target ci-build \
        --build-arg "APT_HTTP_MIRROR=${APT_HTTP_MIRROR:-}" \
        --build-arg "STORE_PASSWORD=${STORE_PASSWORD:-}" \
        --build-arg "KEY_PASSWORD=${KEY_PASSWORD:-}" \
        --build-arg "KEY_ALIAS=${KEY_ALIAS:-}" \
        --build-arg "KEYSTORE_PATH=${KEYSTORE_PATH:-}" \
        -t "wiva-android-ci:${CI_PIPELINE_ID}" \
        .
    - mkdir -p release
    - |
      CID="$(docker create "wiva-android-ci:${CI_PIPELINE_ID}")"
      docker cp "${CID}:/app/release/." ./release/
      docker rm -v "${CID}"
    - scripts/ci-align-release-owner.sh
    - docker rmi "wiva-android-ci:${CI_PIPELINE_ID}" || true
    - ls -la release/
    - |
      if [ -n "${WIVA_OTA_RELEASE_DIR:-}" ]; then
        echo "WIVA_OTA_RELEASE_DIR=${WIVA_OTA_RELEASE_DIR}"
        mkdir -p "${WIVA_OTA_RELEASE_DIR}"
        cp -v release/*.apk "${WIVA_OTA_RELEASE_DIR}/"
        ls -la "${WIVA_OTA_RELEASE_DIR}"
      else
        echo "NOTE: WIVA_OTA_RELEASE_DIR не задан — APK только в артефактах job и в ./release/ до очистки."
      fi
  after_script:
    - chmod +x scripts/ci-runner-cleanup.sh
    - scripts/ci-runner-cleanup.sh
  artifacts:
    when: on_success
    expire_in: never
    paths:
      - release/*.apk
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
